version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci --prefix api
      - npm ci --prefix frontend

  pre_build:
    commands:
      - echo "Running linter..."
      - npm run lint --prefix api
      - echo "Running unit tests with coverage..."
      - npm run test:coverage --prefix api
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

  build:
    commands:
      - echo "Building Docker images..."
      - docker build -t $ECR_REGISTRY/$FRONTEND_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION -t $ECR_REGISTRY/$FRONTEND_REPO:latest ./frontend
      - docker build -t $ECR_REGISTRY/$API_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION -t $ECR_REGISTRY/$API_REPO:latest ./api
      - echo "Running Trivy vulnerability scan..."
      - trivy image --exit-code 1 --severity CRITICAL $ECR_REGISTRY/$API_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - trivy image --exit-code 1 --severity CRITICAL $ECR_REGISTRY/$FRONTEND_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - echo "Pushing images to ECR..."
      - docker push $ECR_REGISTRY/$FRONTEND_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push $ECR_REGISTRY/$FRONTEND_REPO:latest
      - docker push $ECR_REGISTRY/$API_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push $ECR_REGISTRY/$API_REPO:latest

  post_build:
    commands:
      - echo "Writing imagedefinitions.json for ECS deploy..."
      - printf '[{"name":"nginx-react","imageUri":"%s"}]' $ECR_REGISTRY/$FRONTEND_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION > frontend-imagedefinitions.json
      - printf '[{"name":"api","imageUri":"%s"}]' $ECR_REGISTRY/$API_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION > api-imagedefinitions.json

artifacts:
  files:
    - frontend-imagedefinitions.json
    - api-imagedefinitions.json
