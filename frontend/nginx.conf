server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── ECS health check ───────────────────────────────────────────────────────
    # ALB and ECS both call GET /health — must return 200 with no auth required.
    # This endpoint is hit every 30 s; keep it as cheap as possible.
    location = /health {
        access_log  off;
        return 200  'ok';
        add_header  Content-Type text/plain;
    }

    # ── Static assets ──────────────────────────────────────────────────────────
    # Vite hashes asset filenames so they are safe to cache forever.
    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Every other path serves index.html so React Router handles routing
    # client-side. The ALB routes /v1/* directly to the API ECS service before
    # requests reach Nginx, so no proxy_pass block is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
